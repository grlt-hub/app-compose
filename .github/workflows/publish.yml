name: Publish

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    if: github.repository == 'grlt-hub/app-compose'
    runs-on: ubuntu-latest
    container:
      image: node:24.8.0-slim
    environment: Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        name: Install pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run build
        run: pnpm build

      - name: Run lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Publish (stubbed)
        run: echo "would publish ${GITHUB_REF_NAME}"
